# =============================================================================
# PyPress — Proxy Parameters Snippet (Reusable)
# =============================================================================
# Include this in any proxy location: include /etc/nginx/snippets/proxy-params.conf;
#
# These headers ensure the upstream service (frontend, admin, backend)
# receives accurate information about the original client request.
# Without these, the backend would see Nginx's IP instead of the real client.
#
# WordPress equivalent: Apache's ProxyPreserveHost, X-Forwarded-For, etc.
# =============================================================================

# Use HTTP/1.1 for upstream connections (enables keepalive)
proxy_http_version 1.1;

# Pass the original Host header so the upstream knows the requested domain
# WordPress equivalent: ProxyPreserveHost On
proxy_set_header Host $host;

# Real client IP (not Nginx's container IP)
proxy_set_header X-Real-IP $remote_addr;

# Chain of proxy IPs the request passed through
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

# Whether the original request was HTTP or HTTPS
# The backend uses this to set Secure flags on cookies correctly
proxy_set_header X-Forwarded-Proto $scheme;

# Original port the client connected to (80 or 443)
proxy_set_header X-Forwarded-Port $server_port;

# Distributed tracing ID — every service logs this same ID
proxy_set_header X-Request-ID $request_id;

# Enable keepalive connections to upstream (for performance)
# Without this, Nginx opens a new TCP connection per request
proxy_set_header Connection "";

# Timeouts for upstream communication
proxy_connect_timeout 30s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Don't intercept upstream errors — let the application handle them
# This means FastAPI's error handlers will produce the error pages,
# not Nginx's generic error pages
proxy_intercept_errors off;
