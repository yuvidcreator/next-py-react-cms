# =============================================================================
# PyPress — WebSocket Upgrade Snippet (Reusable)
# =============================================================================
# Include this in locations that need WebSocket support:
#   include /etc/nginx/snippets/websocket-upgrade.conf;
#
# Used by:
#   - NextJS Frontend: Fast Refresh / HMR in development
#   - React Admin: Vite HMR in development
#   - Future: Real-time notifications, live preview, collaborative editing
#
# WordPress equivalent: No direct equivalent. WordPress doesn't use
# WebSockets natively. Plugins like Jetpack use long-polling instead.
# PyPress uses WebSockets where appropriate for true real-time updates.
# =============================================================================

# These two headers tell Nginx to upgrade the HTTP connection to WebSocket
# when the client requests it (via Upgrade: websocket header).
# If no upgrade is requested, the connection remains normal HTTP.

proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Extended timeouts for WebSocket connections (they're long-lived)
proxy_read_timeout  86400s;
proxy_send_timeout  86400s;
