# =============================================================================
# PyPress — Security Headers Snippet (Reusable)
# =============================================================================
# Include this in any location block: include /etc/nginx/snippets/security-headers.conf;
#
# WordPress equivalent: These headers are normally set by security plugins
# like Wordfence, Sucuri, or iThemes Security. In PyPress, they're enforced
# at the Nginx level — no plugin required, no way to accidentally disable them.
#
# NOTE: This file contains COMMON headers applied to ALL responses.
# Location-specific headers (like the admin's stricter CSP) are added
# in the respective location blocks.
# =============================================================================

# ── HSTS (HTTP Strict Transport Security) ────────────────────────────────
# Tells browsers to ONLY use HTTPS for this domain for the next year.
# After first visit, even if user types http://, browser auto-upgrades.
# includeSubDomains: applies to *.yourdomain.com too.
# preload: allows submission to the HSTS preload list (hstspreload.org).
# WordPress equivalent: "Force SSL" in security plugins.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Content-Type Sniffing Protection ─────────────────────────────────────
# Prevents browsers from "guessing" content types. Without this, a browser
# might execute a .txt file as JavaScript if it looks like JS.
# WordPress equivalent: send_nosniff_header filter in WordPress core.
add_header X-Content-Type-Options "nosniff" always;

# ── XSS Protection ──────────────────────────────────────────────────────
# Legacy header for older browsers. Modern browsers use CSP instead, but
# this provides a safety net for IE11 and similar.
# mode=block: if XSS detected, block the page entirely (don't sanitize).
add_header X-XSS-Protection "1; mode=block" always;

# ── Referrer Policy ─────────────────────────────────────────────────────
# Controls how much URL information is sent when navigating to other sites.
# strict-origin-when-cross-origin:
#   Same-site navigation: full URL (good for analytics)
#   Cross-site navigation: only the origin (https://yourdomain.com)
#   HTTP→HTTPS downgrade: nothing sent (protects privacy)
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions Policy ──────────────────────────────────────────────────
# Controls which browser features (camera, mic, geolocation, etc.) this
# site is allowed to use. A CMS typically needs none of these.
# WordPress equivalent: No built-in equivalent; some WAF plugins add this.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# ── Cross-Origin Policies ───────────────────────────────────────────────
# COEP, COOP, CORP — defense against Spectre-style side-channel attacks.
# These prevent cross-origin resources from being loaded in dangerous ways.

# Cross-Origin-Opener-Policy: isolates the browsing context
# same-origin: prevents other sites from getting a reference to this window
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Cross-Origin-Resource-Policy: controls who can load this site's resources
# same-origin: only this site can embed its own resources
# NOTE: If you use a CDN for assets, change to "cross-origin" for those locations
add_header Cross-Origin-Resource-Policy "same-origin" always;

# ── Server Header ───────────────────────────────────────────────────────
# Hide the server software identifier. Attackers use this for fingerprinting.
# Combined with server_tokens off in nginx.conf, this removes all version info.
# WordPress equivalent: remove_action('wp_head', 'wp_generator') to hide WP version.
add_header X-Powered-By "" always;
