# =============================================================================
# PyPress — SSL/TLS Configuration Snippet
# =============================================================================
# Include this in the HTTPS server block: include /etc/nginx/snippets/ssl-params.conf;
#
# Implements Mozilla's "Intermediate" TLS configuration:
# https://ssl-config.mozilla.org/#server=nginx&config=intermediate
#
# This provides broad browser compatibility (back to Firefox 27, Chrome 31,
# IE 11, Android 4.4) while maintaining strong security.
#
# WordPress equivalent: Really Simple SSL plugin + manual TLS hardening
# that most WordPress admins never do. In PyPress, it's built into the
# infrastructure layer — no plugin needed, no way to misconfigure it.
# =============================================================================

# ── Certificate Paths (Let's Encrypt / Certbot) ─────────────────────────
# These paths match where Certbot stores certificates by default.
# The docker-compose.yml mounts the certbot volume here.
ssl_certificate     /etc/nginx/ssl/fullchain.pem;
ssl_certificate_key /etc/nginx/ssl/privkey.pem;

# Diffie-Hellman parameters for DHE ciphers (generate with: openssl dhparam -out dhparam.pem 2048)
# This prevents the Logjam attack on older DHE key exchange.
# If dhparam.pem doesn't exist, Nginx will still work but without DHE ciphers.
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ── Protocol Versions ───────────────────────────────────────────────────
# TLS 1.2 and 1.3 only. TLS 1.0 and 1.1 are deprecated and vulnerable.
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher Suites ───────────────────────────────────────────────────────
# Server chooses the cipher (not the client) — prevents cipher downgrade attacks.
ssl_prefer_server_ciphers off;

# Mozilla Intermediate cipher list — strong but widely compatible.
# TLS 1.3 ciphers are configured automatically by OpenSSL.
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;

# ── Session Caching ─────────────────────────────────────────────────────
# Cache TLS sessions so returning visitors don't need a full handshake.
# 10MB cache ≈ 40,000 sessions. Timeout of 1 day balances security/perf.
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;

# Disable session tickets (they can weaken forward secrecy if the ticket
# key is compromised). Session cache is sufficient for performance.
ssl_session_tickets off;

# ── OCSP Stapling ───────────────────────────────────────────────────────
# Nginx fetches the OCSP response from Let's Encrypt and "staples" it to
# the TLS handshake. This means the browser doesn't need to contact Let's
# Encrypt separately to verify the certificate isn't revoked — faster and
# more privacy-preserving.
ssl_stapling on;
ssl_stapling_verify on;

# DNS resolver for OCSP stapling (Google + Cloudflare public DNS)
resolver 8.8.8.8 1.1.1.1 valid=300s;
resolver_timeout 5s;
