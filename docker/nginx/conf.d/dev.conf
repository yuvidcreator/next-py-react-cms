# =============================================================================
# PyPress CMS — Development Nginx Configuration
# =============================================================================
# Used by docker-compose.dev.yml (`make dev`).
#
# Differences from production:
#   - HTTP only (no SSL)
#   - API proxy is OPEN (for Swagger UI / Postman testing)
#   - No rate limiting (annoying during development)
#   - No HSTS (can't enforce HTTPS without HTTPS)
#   - Larger upload limit (for testing with big files)
#   - WebSocket support for HMR (Next.js Fast Refresh + Vite HMR)
#
# Security headers are still applied because developers should test
# against realistic conditions, but CSP is relaxed to allow dev tools.
# =============================================================================

# ── WebSocket connection upgrade map ─────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # Larger upload limit for dev testing
    client_max_body_size 128M;

    # ── Security Headers (minus HSTS — no SSL in dev) ────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── PUBLIC: Main → NextJS Dev Server ─────────────────────────────────
    location / {
        include /etc/nginx/snippets/proxy-params.conf;
        include /etc/nginx/snippets/websocket-upgrade.conf;
        proxy_pass http://frontend_upstream;
    }

    # ── PUBLIC: NextJS Static & Image Optimization ───────────────────────
    location /_next/ {
        include /etc/nginx/snippets/proxy-params.conf;
        include /etc/nginx/snippets/websocket-upgrade.conf;
        proxy_pass http://frontend_upstream;
        # No caching in dev — we want to see changes immediately
        expires -1;
    }

    # ── ADMIN: → Vite Dev Server ─────────────────────────────────────────
    location /admin {
        include /etc/nginx/snippets/proxy-params.conf;
        include /etc/nginx/snippets/websocket-upgrade.conf;
        proxy_pass http://admin_upstream;

        # Still apply noindex even in dev (good habit, no surprises in prod)
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "no-store" always;
    }

    # ── API: OPEN in dev (for Swagger UI & Postman testing) ──────────────
    # In production, /api returns 404. In dev, we proxy it through
    # so developers can test the API directly at localhost/api/v1/...
    # and access Swagger docs at localhost/api/docs.
    location /api/ {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://backend_upstream;

        # Pass cookies through (httpOnly auth cookies)
        proxy_pass_header Set-Cookie;

        # Extended timeout for debugging (breakpoints, slow queries)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Internal API (same as production, for admin dev testing) ──────────
    location /internal-api/ {
        rewrite ^/internal-api/(.*) /api/$1 break;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://backend_upstream;
        proxy_pass_header Set-Cookie;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 128M;
    }

    # ── STATIC: Media Uploads (no caching in dev) ────────────────────────
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires -1;
        add_header Access-Control-Allow-Origin "*";
    }

    # ── SEO Routes (proxied even in dev for testing) ─────────────────────
    location = /sitemap.xml {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;
    }

    location = /robots.txt {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;
    }

    # ── BLOCKED: Sensitive paths (even in dev) ───────────────────────────
    location ~ /\. { deny all; return 404; access_log off; }
}
