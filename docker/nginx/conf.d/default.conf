# =============================================================================
# PyPress CMS — Production Site Configuration
# =============================================================================
# This is the COMPLETE routing and security configuration for PyPress.
# Every request that reaches the server passes through these rules.
#
# ROUTING TABLE:
#   /                    → NextJS Frontend (SSR, crawlable)
#   /blog/*, /page/*     → NextJS Frontend
#   /category/*, /tag/*  → NextJS Frontend
#   /author/*, /search   → NextJS Frontend
#   /sitemap.xml         → NextJS Frontend
#   /robots.txt          → NextJS Frontend
#   /feed, /feed/*       → NextJS Frontend
#   /admin, /admin/*     → React Admin (noindex, nofollow, X-Frame-Options: DENY)
#   /admin/login         → React Admin (rate-limited login page)
#   /api, /api/*         → BLOCKED (404 for public, proxied for admin internal)
#   /uploads/*           → Static files from volume (cached 30d)
#   /_next/*             → NextJS static assets (cached 1y, immutable)
#   /.well-known/acme-*  → Certbot challenge (for Let's Encrypt)
#
# SECURITY ENFORCED:
#   - HSTS, CSP, XSS Protection, nosniff on ALL responses
#   - Admin: X-Robots-Tag: noindex,nofollow + X-Frame-Options: DENY
#   - API: 404 for all public requests (defense-in-depth)
#   - Login: Rate limited to 5 attempts/minute
#   - Uploads: Only allowed file extensions served
#   - SSL: TLS 1.2/1.3, OCSP stapling, session caching
#
# WordPress equivalent: .htaccess + Wordfence + Really Simple SSL +
# Yoast SEO's robots.txt + WP Super Cache's rewrite rules — all in
# one unified, auditable configuration file.
# =============================================================================

# ── WebSocket connection upgrade map (needed for HMR/live features) ──────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =============================================================================
# SERVER BLOCK 1: HTTP → HTTPS Redirect (Port 80)
# =============================================================================
# All HTTP requests are permanently redirected to HTTPS.
# Exception: ACME challenges for Let's Encrypt certificate verification.
#
# WordPress equivalent: Really Simple SSL's "force HTTPS" redirect.
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Let's Encrypt ACME Challenge ─────────────────────────────────────
    # Certbot places verification files here during certificate issuance.
    # This MUST be available on port 80 (HTTP) — it's how Let's Encrypt
    # proves you control the domain.
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/certbot;
        allow all;
    }

    # ── Redirect everything else to HTTPS ────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# SERVER BLOCK 2: Main HTTPS Server (Port 443)
# =============================================================================
# This is where ALL the routing and security rules live.
# If SSL certificates are not yet configured, use no-ssl.conf instead
# (see docker/nginx/conf.d/no-ssl.conf for HTTP-only bootstrapping).
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # ── SSL Configuration ────────────────────────────────────────────────
    include /etc/nginx/snippets/ssl-params.conf;

    # ── Global Security Headers ──────────────────────────────────────────
    # Applied to EVERY response from this server block.
    include /etc/nginx/snippets/security-headers.conf;

    # ── Global Rate Limiting ─────────────────────────────────────────────
    # 10 req/s per IP with burst tolerance of 20 (queued, not rejected)
    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;

    # ── Error Pages ──────────────────────────────────────────────────────
    # Custom error pages served by the frontend (for consistent branding)
    error_page 404 /404;
    error_page 500 502 503 504 /500;

    # =====================================================================
    # SECTION 1: PUBLIC ROUTES → NextJS Frontend
    # =====================================================================
    # These are the SEO-crawlable, public-facing routes. NextJS renders
    # them server-side (SSR) by fetching data from the backend over the
    # internal Docker network, then returns fully-rendered HTML.
    #
    # WordPress equivalent: The main WordPress rewrite rules that route
    # pretty permalinks to index.php for processing by the template engine.
    # =====================================================================

    # ── Main catch-all → NextJS Frontend ─────────────────────────────────
    # Everything that doesn't match a more specific location goes to NextJS.
    # Covers: /, /blog/*, /page/*, /category/*, /tag/*, /author/*,
    # /search, /404, /500, and any custom post type URLs.
    location / {
        include /etc/nginx/snippets/proxy-params.conf;
        include /etc/nginx/snippets/websocket-upgrade.conf;
        proxy_pass http://frontend_upstream;

        # Content-Security-Policy for Public Pages
        # Moderate CSP: allows inline styles (needed for SSR hydration) and
        # images from the same origin + data URIs (for inline SVGs/base64).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    }

    # ── NextJS Static Assets (hashed filenames → cache forever) ──────────
    # WordPress equivalent: wp-content/cache/ with far-future expiry
    location /_next/static/ {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── NextJS Image Optimization ────────────────────────────────────────
    location /_next/image {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SEO: Sitemap ─────────────────────────────────────────────────────
    # WordPress equivalent: Yoast SEO sitemap generation
    location = /sitemap.xml {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap-index.xml {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── SEO: Robots.txt ──────────────────────────────────────────────────
    # WordPress equivalent: WordPress's built-in robots.txt handler
    location = /robots.txt {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── RSS/Atom Feeds ───────────────────────────────────────────────────
    # WordPress equivalent: wp_rss2_head / the_feed()
    location /feed {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Favicon ──────────────────────────────────────────────────────────
    location = /favicon.ico {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://frontend_upstream;
        expires 30d;
        access_log off;
    }

    # =====================================================================
    # SECTION 2: ADMIN ROUTES → React Admin Panel
    # =====================================================================
    # The admin panel is served at /admin, equivalent to WordPress's
    # /wp-admin. It is:
    #   1. Protected from search engine indexing (noindex, nofollow)
    #   2. Protected from clickjacking (X-Frame-Options: DENY)
    #   3. Protected from embedding (frame-ancestors 'none')
    #   4. Rate-limited on the login endpoint
    #
    # Authentication is handled by the React app + backend (httpOnly
    # cookies). Nginx doesn't check auth — it ensures security headers
    # are always present and the pages are never indexed.
    # =====================================================================

    # ── Admin Login — Extra Rate Limiting ────────────────────────────────
    # Brute-force protection: 5 login attempts per minute per IP.
    # WordPress equivalent: Limit Login Attempts Reloaded plugin.
    # NOTE: This must come BEFORE the general /admin block so Nginx
    # matches the more specific path first.
    location = /admin/login {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://admin_upstream;

        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        # Anti-indexing + clickjack protection
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Admin Static Assets (Vite hashed bundles) ────────────────────────
    # Cache aggressively but still add noindex (belt and suspenders).
    location /admin/assets/ {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://admin_upstream;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
        access_log off;
    }

    # ── Admin — General (all /admin/* pages) ─────────────────────────────
    location /admin {
        include /etc/nginx/snippets/proxy-params.conf;
        include /etc/nginx/snippets/websocket-upgrade.conf;
        proxy_pass http://admin_upstream;

        # Anti-Indexing: tell ALL crawlers to never index admin pages.
        # WordPress equivalent: wp_no_robots() + <meta name="robots" content="noindex">
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

        # Clickjacking Protection: admin cannot be embedded in ANY iframe.
        # WordPress equivalent: X-Frame-Options set by WP core for wp-admin.
        add_header X-Frame-Options "DENY" always;

        # Strict CSP for Admin (tighter than public pages)
        # frame-ancestors 'none': CSP-level iframe prevention for modern browsers
        # connect-src includes ws:/wss: for WebSocket (Vite HMR, live features)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # No caching: admin pages contain personalized, sensitive data
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # =====================================================================
    # SECTION 3: API ROUTES → BLOCKED (Defense-in-Depth)
    # =====================================================================
    # The backend is ALREADY unreachable from the public internet (no port
    # mapping, lives on pypress-internal only). This Nginx block is
    # ADDITIONAL defense-in-depth — even if Docker networking were
    # misconfigured, this rule would still block public API access.
    #
    # The admin panel's browser requests use /internal-api/ prefix which
    # Nginx rewrites and proxies to the backend (see Section 3b).
    # =====================================================================

    # ── Public API Access: HARD BLOCK ────────────────────────────────────
    # Return 404 (not 403) to avoid leaking that an API exists.
    # WordPress equivalent: blocking /wp-json/ for a private API.
    location /api {
        access_log /var/log/nginx/blocked-api.log main;
        return 404;
    }

    # ── Internal API Proxy (for Admin Panel Browser Requests) ────────────
    # The React Admin uses /internal-api/v1/... as its API base URL.
    # Nginx rewrites this to /api/v1/... before forwarding to the backend.
    #
    # Protected by:
    #   1. Distinct path prefix /internal-api/ (no conflict with /api block)
    #   2. Referer check: only accepts requests from /admin pages
    #   3. Rate limiting: 30 req/s per IP
    location /internal-api/ {
        # Only accept requests originating from admin pages
        # (Not a hard security boundary — Referer can be spoofed — but
        # it blocks accidental public access and naive attack attempts)
        valid_referers server_names ~*/admin;
        if ($invalid_referer) {
            return 404;
        }

        limit_req zone=api burst=50 nodelay;

        # Rewrite /internal-api/v1/... → /api/v1/... for the backend
        rewrite ^/internal-api/(.*) /api/$1 break;

        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://backend_upstream;

        # No caching for API responses
        add_header Cache-Control "no-store" always;

        # Pass cookies through (httpOnly auth cookies need this)
        proxy_pass_header Set-Cookie;

        # Extended timeout for large operations (media upload, bulk actions)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 64M;
    }

    # =====================================================================
    # SECTION 4: STATIC FILES → Served Directly from Volumes
    # =====================================================================
    # Nginx serves static files directly from Docker volumes, bypassing
    # application servers entirely for much better performance.
    #
    # WordPress equivalent: Apache's mod_rewrite rules for wp-content/uploads/
    # =====================================================================

    # ── Media Uploads ────────────────────────────────────────────────────
    # WordPress equivalent: wp-content/uploads/
    location /uploads/ {
        alias /usr/share/nginx/uploads/;

        # 30-day cache (media URLs include timestamps/unique names)
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Vary "Accept-Encoding";

        # Allow cross-origin for images (CDN subdomain compatibility)
        add_header Access-Control-Allow-Origin "*";

        # CRITICAL: Prevent execution of uploaded files.
        # Even if someone uploads a .php or .py, Nginx won't execute it.
        # WordPress equivalent: .htaccess in wp-content/uploads/ disabling PHP.
        location ~* \.(php|py|sh|bash|cgi|pl|rb)$ {
            deny all;
            return 404;
        }

        # Only serve known-safe file types
        location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|mp4|webm|ogg|mp3|wav|pdf|doc|docx|xls|xlsx|ppt|pptx|zip|gz|tar|txt|csv|json|xml|woff|woff2|ttf|eot|css|js)$ {
            try_files $uri =404;
        }

        access_log off;
    }

    # =====================================================================
    # SECTION 5: BLOCKED PATHS — Security Hardening
    # =====================================================================
    # Block access to sensitive files and common attack vectors.
    # WordPress equivalent: .htaccess rules blocking wp-config.php, etc.
    # =====================================================================

    # ── Hidden files (dotfiles: .env, .git, .htaccess, etc.) ─────────────
    location ~ /\. {
        deny all;
        return 404;
        access_log off;
    }

    # ── WordPress probe paths (bots scanning for WP installations) ───────
    location ~* ^/(wp-admin|wp-login\.php|wp-content|wp-includes|xmlrpc\.php|wp-json) {
        return 404;
        access_log off;
    }

    # ── Other CMS probes (Drupal, Joomla, Magento, etc.) ────────────────
    location ~* ^/(administrator|joomla|drupal|typo3|magento) {
        return 404;
        access_log off;
    }

    # ── Backup and source code files ─────────────────────────────────────
    location ~* \.(bak|backup|old|orig|save|swp|tmp|sql|dump)$ {
        deny all;
        return 404;
    }

    location ~* \.(py|pyc|pyo|env|ini|conf|cfg|yml|yaml|toml|log)$ {
        deny all;
        return 404;
    }
}
