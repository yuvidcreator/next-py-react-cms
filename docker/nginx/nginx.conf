# =============================================================================
# PyPress CMS — Nginx Main Configuration (Production)
# =============================================================================
# WordPress equivalent: Apache's httpd.conf + WordPress's .htaccess
#
# This is the ONLY service exposed to the internet. It enforces:
#   1. Public requests  → NextJS frontend (crawlable, SSR for SEO)
#   2. /admin requests  → React admin (noindex, nofollow, X-Frame-Options: DENY)
#   3. /api requests    → BLOCKED (404 — API is internal-only)
#   4. Static assets    → Served directly from volumes (with cache headers)
#   5. SSL termination  → Let's Encrypt (auto-renewable)
#   6. Security headers → HSTS, CSP, XSS protection on every response
#
# Architecture:
#   Internet → Nginx ──[pypress-public]──→ NextJS Frontend
#                     ──[pypress-admin-net]──→ React Admin
#   (Backend is on pypress-internal ONLY — Nginx reaches it through
#    the internal network for admin-originated /api proxy requests)
# =============================================================================

# Run as non-root user for security (Alpine nginx image supports this)
user nginx;

# Auto-detect CPU cores — one worker per core for optimal performance
# WordPress/Apache equivalent: MaxRequestWorkers / ServerLimit
worker_processes auto;

# Limit each worker to 65536 open file descriptors
worker_rlimit_nofile 65536;

error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

# ── Event Loop Configuration ────────────────────────────────────────────
# WordPress/Apache equivalent: mpm_event or mpm_worker module settings
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# ── HTTP Configuration ──────────────────────────────────────────────────
http {
    # ── MIME Types ───────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    # Structured JSON log format for Loki/Grafana ingestion.
    # Includes request ID for distributed tracing across services.
    log_format main escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log main;

    # ── Performance Tuning ───────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # Buffer sizes for proxied responses
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # ── Client Limits ────────────────────────────────────────────────────
    # WordPress equivalent: upload_max_filesize in php.ini
    client_max_body_size 64M;

    # Timeouts to prevent slow-loris attacks
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          30s;

    # ── Gzip Compression ─────────────────────────────────────────────────
    # WordPress equivalent: mod_deflate / WP Super Cache gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/vnd.ms-fontobject
        font/opentype
        font/ttf
        image/svg+xml;

    # ── Rate Limiting Zones ──────────────────────────────────────────────
    # WordPress equivalent: Wordfence / Limit Login Attempts plugin
    limit_req_zone $binary_remote_addr zone=general:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=30r/s;

    # ── Upstream Definitions ─────────────────────────────────────────────
    # Docker internal DNS resolves service names to container IPs.
    # WordPress equivalent: ProxyPass in Apache mod_proxy
    upstream frontend_upstream {
        server pypress-frontend:3000;
        keepalive 32;
    }

    upstream admin_upstream {
        server pypress-admin:3001;
        keepalive 16;
    }

    # Backend upstream is ONLY used for internal proxying of admin's
    # browser-originated /api/v1/... requests. This does NOT make the
    # backend publicly accessible — the server block controls who can
    # reach this upstream.
    upstream backend_upstream {
        server pypress-backend:8000;
        keepalive 32;
    }

    # ── Security: Hide Nginx Version ─────────────────────────────────────
    server_tokens off;

    # ── Request ID for Distributed Tracing ───────────────────────────────
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ── Include Site Configurations ──────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
