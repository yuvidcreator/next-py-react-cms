# =============================================================================
# PyPress CMS — Alembic Configuration
# =============================================================================
# WordPress equivalent: WordPress has no migration system. It uses
# dbDelta() which tries to diff the desired schema against the actual
# schema. This is fragile and irreversible. Alembic uses versioned
# migration files — each change is a numbered Python script that can
# be applied (upgrade) or rolled back (downgrade).
#
# The DATABASE_URL is read from the environment variable at runtime,
# not hardcoded here. This follows the twelve-factor app pattern.
# =============================================================================

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template for new migration filenames
# Format: YYYYMMDD_HHMMSS_<slug>.py (chronological ordering)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Prepend the current date to migration filenames (already handled by file_template)
prepend_sys_path = .

# ── Naming Conventions ───────────────────────────────────────────────────
# These ensure consistent constraint names across all migrations.
# Without these, PostgreSQL generates random names like "ix_abc123"
# which are impossible to reference in future migrations.
[alembic:naming_convention]
ix = ix_%(column_0_label)s
uq = uq_%(table_name)s_%(column_0_name)s
ck = ck_%(table_name)s_%(constraint_name)s
fk = fk_%(table_name)s_%(column_0_name)s_%(referred_table_name)s
pk = pk_%(table_name)s

[post_write_hooks]
# Run ruff to format newly generated migration files
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
