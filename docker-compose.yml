# version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pypress-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pypress
      POSTGRES_USER: pypress
      POSTGRES_PASSWORD: pypress_dev_password
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pypress"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pypress-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build: {context: ./backend, dockerfile: Dockerfile}
    container_name: pypress-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pypress:pypress_dev_password@db:5432/pypress
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    command: uvicorn backend.core.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
